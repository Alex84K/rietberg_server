name: Node.js CI with Docker Build and Deploy

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

env:
  DOCKER_IMAGE: 'rietberg_server'
  DEPLOY_DIR: '/root/rietberg_server'
  CONTAINER_NAME: 'rietberg_server'
  HOST_PORT: '5015'
  CONTAINER_PORT: '5015'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:latest .

      - name: Save Docker image to tar
        run: |
          docker save ${{ env.DOCKER_IMAGE }}:latest -o ${{ env.DOCKER_IMAGE }}.tar
          # Важно: даем права на чтение, чтобы SCP мог забрать файл
          sudo chmod 644 ${{ env.DOCKER_IMAGE }}.tar

      - name: Copy files via SSH Key
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "${{ env.DOCKER_IMAGE }}.tar,docker-compose.yml"
          target: ${{ env.DEPLOY_DIR }}
          overwrite: true

  deploy-to-server:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Execute remote commands via SSH Key
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.DEPLOY_DIR }}
            
            # Создаем папку для БД, если её нет
            mkdir -p data
            chmod 777 data
            
            # Загружаем образ
            docker load -i ${{ env.DOCKER_IMAGE }}.tar
            
            # Перезапускаем контейнер
            docker-compose down || true
            docker-compose up -d
            
            # Очистка
            rm ${{ env.DOCKER_IMAGE }}.tar
            docker image prune -f